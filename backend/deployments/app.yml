services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    command: bun run src/cmd/server/main.ts
    ports:
      - "${APP_PORT:-3001}:${APP_PORT:-3001}"
    env_file:
      - ../.env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: ${APP_PORT:-3001}
      DB_POSTGRES_HOST: ${DB_POSTGRES_HOST:-db}
      DB_POSTGRES_PORT: ${DB_POSTGRES_PORT:-5432}
      DB_POSTGRES_NAME: ${DB_POSTGRES_NAME:-sheka}
      DB_POSTGRES_USER: ${DB_POSTGRES_USER:-postgres}
      DB_POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD:-postgres}
      DB_POSTGRES_SSL_MODE: ${DB_POSTGRES_SSL_MODE:-disable}
    volumes:
      - ${HOME}/.sui:/home/bun/.sui:ro
    restart: unless-stopped
